[build]
  base = "staticfiles"
  publish = "staticfiles"
  command = "echo 'Static files ready'"

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/admin/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Redirects for single page applications
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
